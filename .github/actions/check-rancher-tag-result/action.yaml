---
name: Check Rancher Tag Result
description: Checks if the latest Rancher tag tests have passed or not
inputs:
  rancher_tag:
    description: "The Rancher tag to check"
    required: true
  previous_rancher_tag:
    description: "The previous Rancher tag to check against"
    required: true
  dispatch_workflow_list:
    description: "Comma-separated list of workflows to check against the Rancher tag"
    required: true
  github_token:
    description: "GitHub token for API access"
    required: true
outputs:
  failed_workflows_v214:
    description: "Comma-separated list of workflows that did not pass for the given Rancher tag for v2.14"
    value: ${{ steps.check.outputs.failed_workflows_v214 }}
  failed_workflows_v213:
    description: "Comma-separated list of workflows that did not pass for the given Rancher tag for v2.13"
    value: ${{ steps.check.outputs.failed_workflows_v213 }}

runs:
  using: composite
  steps:
    - id: check
      run: |
        TAG="${{ inputs.rancher_tag }}"
        if [[ -z "$TAG" ]]; then
          echo "No Rancher tag provided, skipping check."
          echo "failed_workflows=" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Extract major.minor.patch (e.g., v2.14.1) from the tag. This is important because we do not want to skip the first
        # alpha of a new minor release.
        PATCH_LINE=$(echo "$TAG" | grep -oE '^v[0-9]+\.[0-9]+\.[0-9]+')
        TAG_LIST=$(curl -s https://api.github.com/repos/rancher/rancher/releases | jq -r '.[].tag_name' | grep -E "^$PATCH_LINE" | sort -V)
        TAGS_TO_CHECK=()

        for t in $TAG_LIST; do
          TAGS_TO_CHECK+=("$t")
          [[ "$t" == "$TAG" ]] && break
        done

        workflows=(${DISPATCH_WORKFLOW_LIST//,/ })
        failed_workflows=()

        # For the post-release workflows, skip for alphas or RCs.
        for wf in "${workflows[@]}"; do
          if [[ "$wf" == post-release* ]]; then
            if [[ "$TAG" == *-alpha* || "$TAG" == *-rc* ]]; then
              continue
            fi
          fi

          most_recent_passed_tag=""
          found_skipped=""

          # Fetch all runs for this workflow once, then filter in-memory for tags/jobs
          runs_json=$(gh run list --workflow "$wf" --branch main --json databaseId,headBranch,headSha,conclusion,status,name,displayTitle -L 50)
          run_ids=$(echo "$runs_json" | jq -r '.[].databaseId')

          declare -A run_json_cache
          for run_id in $run_ids; do
            run_json_cache[$run_id]="$(gh run view "$run_id" --json status,conclusion,jobs,headSha,headBranch,displayTitle)"
          done

          for (( idx=${#TAGS_TO_CHECK[@]}-1 ; idx>=0 ; idx-- )); do
            prev_tag="${TAGS_TO_CHECK[$idx]}"
            for run_id in $run_ids; do
              run_json="${run_json_cache[$run_id]}"
              run_status=$(echo "$run_json" | jq -r '.status // empty')
              run_conclusion=$(echo "$run_json" | jq -r '.conclusion // empty')
              jobs_json=$(echo "$run_json" | jq -c '.jobs // []')

              # If there are jobs, check them for the current release line.
              if [[ "$jobs_json" != "[]" ]]; then
                if [[ "$wf" == *upgrade* ]]; then
                  if echo "$jobs_json" | jq -e --arg tag "$prev_tag" '.[]? | select((.name | endswith(" -> " + $tag)) and .conclusion == "success")' > /dev/null; then
                    most_recent_passed_tag="$prev_tag"
                    break 2
                  fi
                  if echo "$jobs_json" | jq -e --arg tag "$prev_tag" '.[]? | select((.name | endswith(" -> " + $tag)) and .conclusion == "skipped")' > /dev/null; then
                    found_skipped=1
                  fi
                else
                  if echo "$jobs_json" | jq -e --arg tag "$prev_tag" '.[]? | select(.name == $tag and .conclusion == "success")' > /dev/null; then
                    most_recent_passed_tag="$prev_tag"
                    break 2
                  fi
                  if echo "$jobs_json" | jq -e --arg tag "$prev_tag" '.[]? | select(.name == $tag and .conclusion == "skipped")' > /dev/null; then
                    found_skipped=1
                  fi
                fi
              elif [[ "$run_conclusion" == "skipped" ]]; then
                # Only count workflow-level skipped if there are no jobs and run itself is skipped.
                found_skipped=1
              fi
            done
          done

          if [[ -n "$most_recent_passed_tag" ]]; then
            echo "Most recent successful tag for workflow $wf is: $most_recent_passed_tag."
          elif [[ -n "$found_skipped" ]]; then
            echo "Workflow $wf was skipped for all tags, ignoring."
          else
            echo "No successful job found for workflow $wf for any previous tag, will re-run for tag $TAG"
            failed_workflows+=("$wf")
          fi
        done

        cleaned_failed_workflows=()

        for wf in "${failed_workflows[@]}"; do
          wf_trimmed=$(echo "$wf" | xargs)
          if [[ -n "$wf_trimmed" ]]; then
            cleaned_failed_workflows+=("$wf_trimmed")
          fi
        done

        failed_workflows_str=$(IFS=,; echo "${cleaned_failed_workflows[*]}")
        echo "failed_workflows_v214=$failed_workflows_str" >> $GITHUB_OUTPUT
        echo "failed_workflows_v213=$failed_workflows_str" >> $GITHUB_OUTPUT
      shell: bash
      env:
        DISPATCH_WORKFLOW_LIST: ${{ inputs.dispatch_workflow_list }}
        GH_TOKEN: ${{ inputs.github_token }}