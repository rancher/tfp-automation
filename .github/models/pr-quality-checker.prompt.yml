---
name: PR Quality Checker
description: Reviews PR titles, descriptions, and commit messages for clarity and consistency.
model: gpt-4.1
modelParameters:
  temperature: 0.3
messages:
  - role: user
    content: |

      Given the following pull request title and commit message, generate a clear and concise PR description that summarizes the work being done. Then, review the title, your generated description, and the commit message for clarity and consistency:
      - Is the title clear and descriptive?
      - Is the generated description clear, complete, and does it accurately reflect the title and commit message?
      - Does the commit message accurately summarize the change?
      - Suggest improvements if needed.

      If any of these do not meet the criteria, start your response with "BLOCKING:" and explain what must be improved.
      If all criteria are met, start your response with "PASS:" followed by a single, clear, and descriptive sentence explaining that the PR title, generated description, and commit message all meet the quality standards and no changes are required.

      PR Title:
      {{pr_title}}

      Commit Message:
      {{commit_message}}

      After your review, output your generated PR description between the following markers on separate lines:
      ===BEGIN DESCRIPTION===
      <your description here>
      ===END DESCRIPTION===