name: Weekly Test Summary

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  weekly-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          submodules: recursive

      - name: Download all test result artifacts from last week
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd #v8
        with:
          script: |
            const fs = require('fs');
            const now = new Date();
            const since = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000); // 7 days ago
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            let count = 0;

            for (const artifact of artifacts.data.artifacts) {
              if (!artifact.name.startsWith('test-result-')) continue;
              const created = new Date(artifact.created_at);
              if (created < since) continue;
              count++;
              console.log(`Downloading artifact: ${artifact.name}`);
              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
                archive_format: 'zip',
              });
              fs.writeFileSync(`./${artifact.name}.zip`, Buffer.from(download.data));
            }

      - name: Unzip all artifacts
        run: |
          for f in test-result-*.zip; do
            unzip -o "$f" -d results
          done
        shell: bash

      - name: Set up Go environment
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: "./go.mod"

      - name: Generate weekly summary chart
        run: |
          go run weeklyTestsReports/generate_weekly_chart.go

      - name: Upload summary chart artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          path: results/weekly_summary.html

      - name: Zip weekly report
        run: |
          cd results
          zip weekly_summary.zip weekly_summary.html

      - name: Upload report to Slack
        uses: slackapi/slack-github-action@0d95c9a7becc1e6e297d76df9bc735c44f4cbcbc # v3
        with:
          method: files.uploadV2
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel_id": "${{ secrets.SLACK_CHANNEL_ID }}",
              "initial_comment": "*Weekly Test Summary - rancher/tfp-automation*",
              "file": "./results/weekly_summary.zip",
              "filename": "weekly_summary.zip",
            }