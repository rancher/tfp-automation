---
name: Sanity Testing

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 7 * * 1,2,5"
  workflow_dispatch:
    inputs:
      rancher_version:
        description: "Rancher version"
      rancher_chart_version:
        description: "Rancher chart version"
      run_all_versions:
        description: "Run all supported versions if manually triggered"
        required: false
        default: false
        type: boolean
      reporting:
        description: "Enable reporting to Qase and Slack"
        required: false
        default: false
        type: boolean
      cloud_provider:
        description: "Cloud provider to setup Rancher"
        required: true
        default: "aws"
        type: choice
        options:
          - aws
  workflow_call:
    inputs:
      rancher_version:
        description: "Rancher tag version provided from check-rancher-tag workflow"
        required: true
        type: string
      rancher_chart_version:
        description: "Rancher chart version provided from check-rancher-tag workflow"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  CLOUD_PROVIDER_VERSION: "5.95.0"
  DOWNSTREAM_PROVIDER: "${{ vars.PROVIDER_AMAZON }}"
  LOCALS_PROVIDER_VERSION: "${{ vars.LOCALS_PROVIDER_VERSION }}"
  PACKAGE: "sanity"
  # PROVIDER: "${{ github.event.inputs.cloud_provider }}"
  PROVIDER: "aws"
  TEST_SUITE: "^TestTfpSanityProvisioningTestSuite$"
  TIMEOUT: "5h"

jobs:
  v2-14:
    # if: |
    #   github.event_name == 'schedule' ||
    #   github.event.inputs.run_all_versions == 'true' ||
    #   (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.rancher_version, 'head'))
    name: ${{ github.event.inputs.rancher_version }}
    runs-on: ubuntu-latest
    environment: head
    env:
      RANCHER2_PROVIDER_VERSION: "${{ vars.RANCHER2_PROVIDER_VERSION_2_14 }}"
      HOSTNAME_PREFIX: "tfp-san-214"
      REPORTING_ENABLED: >-
        ${{
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_call' ||
          github.actor == 'github-actions[bot]' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.reporting == 'true' )
        }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cloud Provider Setup
        uses: ./.github/actions/cloud-provider-setup
        with:
          # cloud-provider: ${{ github.event.inputs.cloud_provider }}
          cloud-provider: "aws"
          iam-role: ${{ secrets.TFP_IAM_ROLE }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Fetch and Set DockerHub Credentials
        uses: rancher-eio/read-vault-secrets@main
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/dockerhub/org-token/credentials username | DOCKERHUB_USERNAME ;
            secret/data/github/repo/${{ github.repository }}/dockerhub/org-token/credentials password | DOCKERHUB_PASSWORD

      - name: Mask Dockerhub Credentials
        run: |
          echo "::add-mask::${{ env.DOCKERHUB_USERNAME }}"
          echo "::add-mask::${{ env.DOCKERHUB_PASSWORD }}"

      - name: Whitelist Runner IP
        uses: ./.github/actions/whitelist-runner-ip
        with:
          # cloud-provider: ${{ github.event.inputs.cloud_provider }}
          cloud-provider: "aws"
          prefix-list-id: ${{ secrets.AWS_MANAGED_PREFIX_LIST_ID }}
          aws-region: "${{ secrets.AWS_REGION }}"

      - name: Set up SSH Keys
        uses: ./.github/actions/setup-ssh-keys
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-private-key-name: ${{ secrets.SSH_PRIVATE_KEY_NAME }}
          windows-ssh-private-key: ${{ secrets.WINDOWS_SSH_PRIVATE_KEY }}
          windows-ssh-private-key-name: ${{ secrets.WINDOWS_SSH_PRIVATE_KEY_NAME }}

      - name: Uniquify hostname prefix
        uses: ./.github/actions/uniquify-hostname

      - name: Set Rancher version
        uses: ./.github/actions/set-env-var
        with:
          key: RANCHER_VERSION
          # value: |
          #   ${{ 
          #     github.event.inputs.rancher_version || 
          #     (github.event_name == 'workflow_dispatch' && github.event.inputs.rancher_version) || 
          #     (github.event_name == 'schedule' && vars.RANCHER_VERSION_2_14_HEAD) ||
          #     (github.event.inputs.run_all_versions == 'true' && vars.RANCHER_VERSION_2_14_HEAD)
          #   }}
          value: head

      - name: Set Rancher chart version
        uses: ./.github/actions/set-env-var
        with:
          key: RANCHER_CHART_VERSION
          # value: |
          #   ${{ 
          #     github.event.inputs.rancher_chart_version || 
          #     (github.event_name == 'workflow_dispatch' && github.event.inputs.rancher_chart_version) || 
          #     (github.event_name == 'schedule' && vars.RELEASED_RANCHER_CHART_VERSION_2_13) ||
          #     (github.event.inputs.run_all_versions == 'true' && vars.RELEASED_RANCHER_CHART_VERSION_2_13)
          #   }}
          value: 2.13.1

      - name: Set Rancher repo
        uses: ./.github/actions/set-rancher-repo
        with:
          rancher-version: ${{ env.RANCHER_VERSION }}
          fallback-repo: ${{ secrets.RANCHER_REPO }}

      - name: Get Qase ID
        if: env.REPORTING_ENABLED == 'true'
        id: get-qase-id
        uses: ./.github/actions/get-qase-id
        with:
          triggered_tag: ${{ github.event.inputs.rancher_version }}
          qase_release_id: ${{ vars.QASE_RELEASE_TEST_RUN_ID_2_14 }}
          qase_recurring_id: ${{ vars.QASE_RECURRING_TEST_RUN_ID_2_14 }}

      - name: Export config from cloud provider
        run: |
          yq -r '
            .terraform.${{ env.PROVIDER }}Config
            | to_entries
            | .[]
            | "\(.key)=\(.value)"
          ' .github/config/sanity/providers/${{ env.PROVIDER }}.yaml >> $GITHUB_ENV

      - name: Create config.yaml
        run: |
          yq eval-all '
            select(fileIndex == 0) * select(fileIndex == 1) * select(fileIndex == 2)
          ' \
          .github/config/sanity/base.yaml.tpl \
          .github/config/sanity/providers/${{ env.PROVIDER }}.yaml \
          .github/config/sanity/rancher/v2-14.yaml \
          | envsubst \
          > config.yaml

      - name: Export CATTLE_TEST_CONFIG
        run: echo "CATTLE_TEST_CONFIG=${{ github.workspace }}/config.yaml" >> $GITHUB_ENV
        shell: bash

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version-file: "./go.mod"

      - name: Build Packages
        run: ./.github/scripts/build-packages.sh

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "${{ vars.TERRAFORM_VERSION }}"
          terraform_wrapper: false

      - name: Setup Rancher2 Provider if RC is present
        if: contains(env.RANCHER2_PROVIDER_VERSION, '-rc')
        run: /home/runner/${{ secrets.PATH_TO_REPO }}/scripts/setup-provider.sh rancher2 v${{ env.RANCHER2_PROVIDER_VERSION }}
        shell: bash

      - name: Run Sanity Test Suite
        uses: ./.github/actions/run-test-suite
        with:
          package: ${{ env.PACKAGE }}
          test-suite: ${{ env.TEST_SUITE }}
          timeout: ${{ env.TIMEOUT }}

      - name: Cloud Provider Infrastructure Cleanup
        if: always()
        uses: ./.github/actions/cloud-provider-cleanup
        with:
          # cloud-provider: ${{ github.event.inputs.cloud_provider }}
          cloud-provider: "aws"
          prefix: "${{ env.HOSTNAME_PREFIX }}"
          aws-region: "${{ secrets.AWS_REGION }}"

      - name: Cloud Provider Downstream Cluster Cleanup
        if: always()
        uses: ./.github/actions/cloud-provider-cleanup
        with:
          # cloud-provider: ${{ github.event.inputs.cloud_provider }}
          cloud-provider: "aws"
          prefix: "auto-${{ env.HOSTNAME_PREFIX }}"
          iam-role: ${{ secrets.TFP_IAM_ROLE }}
          aws-region: "${{ secrets.AWS_REGION }}"

      - name: Revoke Runner IP
        if: always()
        uses: ./.github/actions/revoke-runner-ip
        with:
          # cloud-provider: ${{ github.event.inputs.cloud_provider }}
          cloud-provider: "aws"
          prefix-list-id: ${{ secrets.AWS_MANAGED_PREFIX_LIST_ID }}
          aws-region: "${{ secrets.AWS_REGION }}"

      - name: Set job status output
        if: always()
        run: echo "job_status=${{ job.status }}" >> $GITHUB_OUTPUT
        id: set-job-status

      - name: Reporting Results to Qase
        if: always() && env.REPORTING_ENABLED == 'true'
        uses: ./.github/actions/report-to-qase
        with:
          qase-test-run-id: ${{ steps.get-qase-id.outputs.id }}
          qase-automation-token: ${{ secrets.QASE_TOKEN }}

      - name: Reporting Results to Slack
        if: always() && env.REPORTING_ENABLED == 'true'
        uses: ./.github/actions/report-to-slack
        with:
          rancher-version: ${{ env.RANCHER_VERSION }}
          job-status: ${{ steps.set-job-status.outputs.job_status }}
          slack-channel: ${{ secrets.SLACK_CHANNEL }}
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
  
  v2-13:
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.run_all_versions == 'true' ||
      (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.rancher_version, 'v2.13')) ||
      (github.event_name == 'workflow_call' && startsWith(inputs.rancher_version, 'v2.13'))
    name: ${{ github.event.inputs.rancher_version }}
    runs-on: ubuntu-latest
    environment: latest
    env:
      RANCHER2_PROVIDER_VERSION: "${{ vars.RANCHER2_PROVIDER_VERSION_2_13 }}"
      HOSTNAME_PREFIX: "tfp-san-213"
      REPORTING_ENABLED: >-
        ${{
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_call' ||
          github.actor == 'github-actions[bot]' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.reporting == 'true' )
        }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cloud Provider Setup
        uses: ./.github/actions/cloud-provider-setup
        with:
          cloud-provider: ${{ github.event.inputs.cloud_provider }}
          iam-role: ${{ secrets.TFP_IAM_ROLE }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Fetch and Set DockerHub Credentials
        uses: rancher-eio/read-vault-secrets@main
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/dockerhub/org-token/credentials username | DOCKERHUB_USERNAME ;
            secret/data/github/repo/${{ github.repository }}/dockerhub/org-token/credentials password | DOCKERHUB_PASSWORD

      - name: Mask Dockerhub Credentials
        run: |
          echo "::add-mask::${{ env.DOCKERHUB_USERNAME }}"
          echo "::add-mask::${{ env.DOCKERHUB_PASSWORD }}"

      - name: Whitelist Runner IP
        uses: ./.github/actions/whitelist-runner-ip
        with:
          # cloud-provider: ${{ github.event.inputs.cloud_provider }}
          cloud-provider: "aws"
          prefix-list-id: ${{ secrets.AWS_MANAGED_PREFIX_LIST_ID }}
          aws-region: "${{ secrets.AWS_REGION }}"

      - name: Set up SSH Keys
        uses: ./.github/actions/setup-ssh-keys
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-private-key-name: ${{ secrets.SSH_PRIVATE_KEY_NAME }}
          windows-ssh-private-key: ${{ secrets.WINDOWS_SSH_PRIVATE_KEY }}
          windows-ssh-private-key-name: ${{ secrets.WINDOWS_SSH_PRIVATE_KEY_NAME }}

      - name: Uniquify hostname prefix
        uses: ./.github/actions/uniquify-hostname

      - name: Set Rancher version
        uses: ./.github/actions/set-env-var
        with:
          key: RANCHER_VERSION
          value: |
            ${{ 
              github.event.inputs.rancher_version || 
              (github.event_name == 'workflow_dispatch' && github.event.inputs.rancher_version) || 
              (github.event_name == 'schedule' && vars.RANCHER_VERSION_2_13_HEAD) ||
              (github.event.inputs.run_all_versions == 'true' && vars.RANCHER_VERSION_2_13_HEAD)
            }}

      - name: Set Rancher chart version
        uses: ./.github/actions/set-env-var
        with:
          key: RANCHER_CHART_VERSION
          value: |
            ${{ 
              github.event.inputs.rancher_chart_version || 
              (github.event_name == 'workflow_dispatch' && github.event.inputs.rancher_chart_version) || 
              (github.event_name == 'schedule' && vars.RELEASED_RANCHER_CHART_VERSION_2_13) ||
              (github.event.inputs.run_all_versions == 'true' && vars.RELEASED_RANCHER_CHART_VERSION_2_13)
            }}

      - name: Set Rancher repo
        uses: ./.github/actions/set-rancher-repo
        with:
          rancher-version: ${{ env.RANCHER_VERSION }}
          fallback-repo: ${{ secrets.RANCHER_REPO }}

      - name: Get Qase ID
        if: env.REPORTING_ENABLED == 'true'
        id: get-qase-id
        uses: ./.github/actions/get-qase-id
        with:
          triggered_tag: ${{ github.event.inputs.rancher_version }}
          qase_release_id: ${{ vars.QASE_RELEASE_TEST_RUN_ID_2_13 }}
          qase_recurring_id: ${{ vars.QASE_RECURRING_TEST_RUN_ID_2_13 }}

      - name: Create config.yaml
        run: |
          yq eval-all '
            select(fileIndex == 0) * select(fileIndex == 1) * select(fileIndex == 2)
          ' \
          .github/config/sanity/base.yaml.tpl \
          .github/config/sanity/providers/${{ env.PROVIDER }}.yaml \
          .github/config/sanity/rancher/v2-13.yaml \
          > config.yaml

      - name: Export CATTLE_TEST_CONFIG
        run: echo "CATTLE_TEST_CONFIG=${{ github.workspace }}/config.yaml" >> $GITHUB_ENV
        shell: bash

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version-file: "./go.mod"

      - name: Build Packages
        run: ./.github/scripts/build-packages.sh

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "${{ vars.TERRAFORM_VERSION }}"
          terraform_wrapper: false

      - name: Setup Rancher2 Provider if RC is present
        if: contains(env.RANCHER2_PROVIDER_VERSION, '-rc')
        run: /home/runner/${{ secrets.PATH_TO_REPO }}/scripts/setup-provider.sh rancher2 v${{ env.RANCHER2_PROVIDER_VERSION }}
        shell: bash

      - name: Run Sanity Test Suite
        uses: ./.github/actions/run-test-suite
        with:
          package: ${{ env.PACKAGE }}
          test-suite: ${{ env.TEST_SUITE }}
          timeout: ${{ env.TIMEOUT }}

      - name: Refresh AWS credentials
        if: always()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TFP_IAM_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Cloud Provider Infrastructure Cleanup
        if: always()
        uses: ./.github/actions/cloud-provider-cleanup
        with:
          cloud-provider: ${{ github.event.inputs.cloud_provider }}
          prefix: "${{ env.HOSTNAME_PREFIX }}"
          aws-region: "${{ secrets.AWS_REGION }}"

      - name: Cloud Provider Downstream Cluster Cleanup
        if: always()
        uses: ./.github/actions/cloud-provider-cleanup
        with:
          cloud-provider: ${{ github.event.inputs.cloud_provider }}
          prefix: "auto-${{ env.HOSTNAME_PREFIX }}"
          iam-role: ${{ secrets.TFP_IAM_ROLE }}
          aws-region: "${{ secrets.AWS_REGION }}"

      - name: Revoke Runner IP
        if: always()
        uses: ./.github/actions/revoke-runner-ip
        with:
          # cloud-provider: ${{ github.event.inputs.cloud_provider }}
          cloud-provider: "aws"
          prefix-list-id: ${{ secrets.AWS_MANAGED_PREFIX_LIST_ID }}
          aws-region: "${{ secrets.AWS_REGION }}"

      - name: Set job status output
        if: always()
        run: echo "job_status=${{ job.status }}" >> $GITHUB_OUTPUT
        id: set-job-status

      - name: Reporting Results to Qase
        if: always() && env.REPORTING_ENABLED == 'true'
        uses: ./.github/actions/report-to-qase
        with:
          qase-test-run-id: ${{ steps.get-qase-id.outputs.id }}
          qase-automation-token: ${{ secrets.QASE_TOKEN }}

      - name: Reporting Results to Slack
        if: always() && env.REPORTING_ENABLED == 'true'
        uses: ./.github/actions/report-to-slack
        with:
          rancher-version: ${{ env.RANCHER_VERSION }}
          job-status: ${{ steps.set-job-status.outputs.job_status }}
          slack-channel: ${{ secrets.SLACK_CHANNEL }}
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
  
