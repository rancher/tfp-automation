      REPORTING_ENABLED: >-
        ${{
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_call' ||
          github.actor == 'github-actions[bot]' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.reporting == 'true' )
        }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cloud Provider Setup
        uses: ./.github/actions/cloud-provider-setup
        with:
          cloud-provider: ${{ github.event.inputs.cloud_provider }}
          iam-role: ${{ secrets.TFP_IAM_ROLE }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Fetch and Set DockerHub Credentials
        uses: rancher-eio/read-vault-secrets@main
        with:
          secrets: |
