      - name: Set Rancher chart url
        uses: ./.github/actions/set-rancher-chart-url
        with:
          rancher-repo: ${{ env.RANCHER_REPO }}
          staging-chart-url: ${{ secrets.STAGING_RANCHER_HELM_CHART_URL }}
